{id:61,dim:"TF",zh:"别人请你帮忙但你很忙？","zh-TW":"別人請你幫忙但你很忙？",en:"Someone asks for help but you're busy?",ja:"忙しい時に助けを求められたら？",a:{zh:"合理拒绝","zh-TW":"合理拒絕",en:"Reasonably decline",ja:"合理的に断る"},b:{zh:"尽量帮","zh-TW":"盡量幫",en:"Try to help anyway",ja:"できるだけ助ける"}},
{id:62,dim:"TF",zh:"争论时你更在乎？","zh-TW":"爭論時你更在乎？",en:"In arguments, you care more about?",ja:"議論では何が大事？",a:{zh:"谁说的对","zh-TW":"誰說的對",en:"Who is right",ja:"誰が正しいか"},b:{zh:"大家的关系","zh-TW":"大家的關係",en:"Everyone's relationship",ja:"みんなの関係"}},
{id:63,dim:"TF",zh:"做选择时？","zh-TW":"做選擇時？",en:"When making choices?",ja:"選択をする時？",a:{zh:"列出利弊分析","zh-TW":"列出利弊分析",en:"List pros and cons",ja:"長所短所を分析する"},b:{zh:"跟着心走","zh-TW":"跟著心走",en:"Follow your heart",ja:"心に従う"}},
{id:64,dim:"TF",zh:"看到感人的电影？","zh-TW":"看到感人的電影？",en:"Watching a touching movie?",ja:"感動的な映画を見た時？",a:{zh:"觉得还好","zh-TW":"覺得還好",en:"Feel okay, not too emotional",ja:"まあまあだと感じる"},b:{zh:"容易感动落泪","zh-TW":"容易感動落淚",en:"Easily moved to tears",ja:"感動して涙が出やすい"}},
{id:65,dim:"TF",zh:"你认为好的领导应该？","zh-TW":"你認為好的領導應該？",en:"A good leader should?",ja:"良いリーダーは？",a:{zh:"能力强决策果断","zh-TW":"能力強決策果斷",en:"Be competent and decisive",ja:"能力が高く決断力がある"},b:{zh:"善解人意有温度","zh-TW":"善解人意有溫度",en:"Be empathetic and warm",ja:"共感力があり温かい"}},
{id:66,dim:"TF",zh:"朋友做了不好的决定？","zh-TW":"朋友做了不好的決定？",en:"A friend made a bad decision?",ja:"友人が悪い決断をした時？",a:{zh:"直接指出问题","zh-TW":"直接指出問題",en:"Point out the problem directly",ja:"直接問題を指摘する"},b:{zh:"找合适时机委婉提","zh-TW":"找合適時機委婉提",en:"Find the right moment to gently mention",ja:"適切なタイミングでやんわり伝える"}},
{id:67,dim:"TF",zh:"购物时你更看重？","zh-TW":"購物時你更看重？",en:"When shopping, you value more?",ja:"買い物で重視するのは？",a:{zh:"性价比和功能","zh-TW":"性價比和功能",en:"Value for money and function",ja:"コスパと機能"},b:{zh:"外观和感觉","zh-TW":"外觀和感覺",en:"Appearance and how it feels",ja:"見た目と感覚"}},
{id:68,dim:"TF",zh:"面对不公平的事？","zh-TW":"面對不公平的事？",en:"When facing injustice?",ja:"不公平に直面した時？",a:{zh:"据理力争","zh-TW":"據理力爭",en:"Argue based on facts",ja:"事実に基づいて主張する"},b:{zh:"先考虑各方感受","zh-TW":"先考慮各方感受",en:"First consider everyone's feelings",ja:"まず皆の気持ちを考える"}},
{id:69,dim:"TF",zh:"你更欣赏哪种人？","zh-TW":"你更欣賞哪種人？",en:"Which type of person do you admire more?",ja:"どちらの人をより尊敬する？",a:{zh:"理性冷静的","zh-TW":"理性冷靜的",en:"Rational and calm",ja:"理性的で冷静な人"},b:{zh:"温暖有爱的","zh-TW":"溫暖有愛的",en:"Warm and loving",ja:"温かく愛情深い人"}},
{id:70,dim:"TF",zh:"评价一件事你更注重？","zh-TW":"評價一件事你更注重？",en:"When evaluating something, you focus on?",ja:"何かを評価する時に重視するのは？",a:{zh:"效率和结果","zh-TW":"效率和結果",en:"Efficiency and results",ja:"効率と結果"},b:{zh:"过程和人的体验","zh-TW":"過程和人的體驗",en:"Process and people's experience",ja:"過程と人の体験"}},
{id:71,dim:"TF",zh:"处理矛盾时？","zh-TW":"處理矛盾時？",en:"When handling conflicts?",ja:"矛盾を解決する時？",a:{zh:"就事论事找方案","zh-TW":"就事論事找方案",en:"Focus on the issue and find solutions",ja:"問題に集中して解決策を探す"},b:{zh:"先安抚情绪","zh-TW":"先安撫情緒",en:"First soothe emotions",ja:"まず感情を落ち着かせる"}},
{id:72,dim:"JP",zh:"出门前你？","zh-TW":"出門前你？",en:"Before going out, you?",ja:"出かける前に？",a:{zh:"检查清单确保没遗漏","zh-TW":"檢查清單確保沒遺漏",en:"Check your list to make sure nothing's missed",ja:"チェックリストで確認する"},b:{zh:"差不多就走","zh-TW":"差不多就走",en:"Just head out when ready enough",ja:"だいたいで出発する"}},
{id:73,dim:"JP",zh:"你的日程安排？","zh-TW":"你的日程安排？",en:"Your schedule is?",ja:"あなたのスケジュールは？",a:{zh:"精确到小时","zh-TW":"精確到小時",en:"Planned by the hour",ja:"時間単位で計画"},b:{zh:"大概有个方向","zh-TW":"大概有個方向",en:"Roughly directional",ja:"大まかな方向性だけ"}},
{id:74,dim:"JP",zh:"你更喜欢的假期方式？","zh-TW":"你更喜歡的假期方式？",en:"Your preferred vacation style?",ja:"好きな休暇スタイルは？",a:{zh:"行程规划好","zh-TW":"行程規劃好",en:"Well-planned itinerary",ja:"しっかり計画された旅程"},b:{zh:"走到哪算哪","zh-TW":"走到哪算哪",en:"Go wherever the wind takes you",ja:"行き当たりばったり"}},
{id:75,dim:"JP",zh:"工作任务你倾向？","zh-TW":"工作任務你傾向？",en:"For work tasks, you tend to?",ja:"仕事のタスクでは？",a:{zh:"越早完成越好","zh-TW":"越早完成越好",en:"Finish as early as possible",ja:"できるだけ早く終わらせたい"},b:{zh:"灵感来了再做","zh-TW":"靈感來了再做",en:"Wait for inspiration to strike",ja:"インスピレーションが来てから"}},
{id:76,dim:"JP",zh:"你觉得规则？","zh-TW":"你覺得規則？",en:"You think rules are?",ja:"ルールについてどう思う？",a:{zh:"需要遵守","zh-TW":"需要遵守",en:"Meant to be followed",ja:"守るべきもの"},b:{zh:"可以灵活变通","zh-TW":"可以靈活變通",en:"Flexible guidelines",ja:"柔軟に対応できるもの"}},
{id:77,dim:"JP",zh:"买东西时？","zh-TW":"買東西時？",en:"When shopping?",ja:"買い物する時？",a:{zh:"事先列好清单","zh-TW":"事先列好清單",en:"Make a list beforehand",ja:"事前にリストを作る"},b:{zh:"看到喜欢的就买","zh-TW":"看到喜歡的就買",en:"Buy whatever catches your eye",ja:"気に入ったものを買う"}},
{id:78,dim:"JP",zh:"对待日程变更？","zh-TW":"對待日程變更？",en:"When plans change?",ja:"予定が変わった時？",a:{zh:"感到烦躁","zh-TW":"感到煩躁",en:"Feel frustrated",ja:"イライラする"},b:{zh:"觉得无所谓","zh-TW":"覺得無所謂",en:"Don't mind at all",ja:"全然気にしない"}},
{id:79,dim:"JP",zh:"你的文件和照片？","zh-TW":"你的文件和照片？",en:"Your files and photos?",ja:"ファイルや写真は？",a:{zh:"分类整理好","zh-TW":"分類整理好",en:"Organized in folders",ja:"フォルダに分類整理"},b:{zh:"随便放能找到就行","zh-TW":"隨便放能找到就行",en:"Anywhere, as long as I can find them",ja:"どこでも見つけられればOK"}},
{id:80,dim:"JP",zh:"开始新任务时？","zh-TW":"開始新任務時？",en:"Starting a new task?",ja:"新しいタスクを始める時？",a:{zh:"先做计划和大纲","zh-TW":"先做計劃和大綱",en:"Make a plan and outline first",ja:"まず計画とアウトラインを作る"},b:{zh:"直接开始做","zh-TW":"直接開始做",en:"Just jump right in",ja:"すぐ取り掛かる"}},
{id:81,dim:"JP",zh:"你更享受？","zh-TW":"你更享受？",en:"You enjoy more?",ja:"より楽しむのは？",a:{zh:"事情按计划进行","zh-TW":"事情按計劃進行",en:"Things going according to plan",ja:"計画通りに進むこと"},b:{zh:"意想不到的惊喜","zh-TW":"意想不到的驚喜",en:"Unexpected surprises",ja:"予想外のサプライズ"}},
{id:82,dim:"JP",zh:"约朋友见面？","zh-TW":"約朋友見面？",en:"Meeting up with friends?",ja:"友達と会う約束は？",a:{zh:"提前几天约好","zh-TW":"提前幾天約好",en:"Arrange days in advance",ja:"数日前に約束する"},b:{zh:"当天临时约","zh-TW":"當天臨時約",en:"Decide on the day",ja:"当日に決める"}},
{id:83,dim:"JP",zh:"你写文章或报告？","zh-TW":"你寫文章或報告？",en:"When writing an article or report?",ja:"文章やレポートを書く時？",a:{zh:"先列大纲再写","zh-TW":"先列大綱再寫",en:"Outline first, then write",ja:"まずアウトラインを作ってから書く"},b:{zh:"边想边写","zh-TW":"邊想邊寫",en:"Write as ideas come",ja:"考えながら書く"}},
{id:84,dim:"JP",zh:"面对多项任务？","zh-TW":"面對多項任務？",en:"Facing multiple tasks?",ja:"複数のタスクに直面した時？",a:{zh:"排优先级逐项完成","zh-TW":"排優先級逐項完成",en:"Prioritize and do one by one",ja:"優先順位をつけて一つずつ完了"},b:{zh:"同时进行切换自如","zh-TW":"同時進行切換自如",en:"Multitask and switch freely",ja:"同時進行で自由に切り替え"}},
{id:85,dim:"JP",zh:"你理想的一天？","zh-TW":"你理想的一天？",en:"Your ideal day?",ja:"理想的な一日は？",a:{zh:"有条有理每件事都完成","zh-TW":"有條有理每件事都完成",en:"Well-organized, everything done",ja:"整然として全てを完了する"},b:{zh:"自由随心想做什么就做","zh-TW":"自由隨心想做什麼就做",en:"Free to do whatever you feel like",ja:"自由に好きなことをする"}},
{id:86,dim:"JP",zh:"deadline 快到了？","zh-TW":"deadline 快到了？",en:"Deadline approaching?",ja:"締め切りが近い時？",a:{zh:"早就完成了","zh-TW":"早就完成了",en:"Already done ages ago",ja:"とっくに完了している"},b:{zh:"正在全力冲刺","zh-TW":"正在全力衝刺",en:"In full sprint mode",ja:"全力でラストスパート中"}},
{id:87,dim:"AT",zh:"完成一项任务后？","zh-TW":"完成一項任務後？",en:"After completing a task?",ja:"タスクを完了した後？",a:{zh:"满意自己的成果","zh-TW":"滿意自己的成果",en:"Satisfied with your work",ja:"自分の成果に満足する"},b:{zh:"担心是否有疏漏","zh-TW":"擔心是否有疏漏",en:"Worry if you missed something",ja:"見落としがないか心配する"}},
{id:88,dim:"AT",zh:"遇到批评时？","zh-TW":"遇到批評時？",en:"When receiving criticism?",ja:"批判を受けた時？",a:{zh:"理性接受有用的部分","zh-TW":"理性接受有用的部分",en:"Accept the useful parts rationally",ja:"有用な部分を理性的に受け入れる"},b:{zh:"会难过好一阵子","zh-TW":"會難過好一陣子",en:"Feel upset for a while",ja:"しばらく落ち込む"}},
{id:89,dim:"AT",zh:"面试或考试前？","zh-TW":"面試或考試前？",en:"Before an interview or exam?",ja:"面接や試験の前は？",a:{zh:"有信心发挥好","zh-TW":"有信心發揮好",en:"Confident you'll do well",ja:"うまくやれると自信がある"},b:{zh:"紧张睡不好","zh-TW":"緊張睡不好",en:"Too nervous to sleep well",ja:"緊張で眠れない"}},
{id:90,dim:"AT",zh:"与别人比较时？","zh-TW":"與別人比較時？",en:"When comparing yourself with others?",ja:"他人と比較する時？",a:{zh:"觉得自己也不差","zh-TW":"覺得自己也不差",en:"Feel you're doing fine too",ja:"自分も悪くないと思う"},b:{zh:"容易觉得不如人","zh-TW":"容易覺得不如人",en:"Easily feel inferior",ja:"すぐ劣等感を感じる"}},
{id:91,dim:"AT",zh:"开始新挑战时？","zh-TW":"開始新挑戰時？",en:"When starting a new challenge?",ja:"新しい挑戦を始める時？",a:{zh:"兴奋期待","zh-TW":"興奮期待",en:"Excited and eager",ja:"ワクワクして楽しみ"},b:{zh:"担心自己做不好","zh-TW":"擔心自己做不好",en:"Worry you won't do well",ja:"うまくできるか心配"}},
{id:92,dim:"AT",zh:"被表扬时？","zh-TW":"被表揚時？",en:"When praised?",ja:"褒められた時？",a:{zh:"坦然接受","zh-TW":"坦然接受",en:"Accept it confidently",ja:"堂々と受け入れる"},b:{zh:"觉得受之有愧","zh-TW":"覺得受之有愧",en:"Feel you don't deserve it",ja:"自分にはもったいないと感じる"}},
{id:93,dim:"AT",zh:"遇到不确定的事？","zh-TW":"遇到不確定的事？",en:"Facing uncertainty?",ja:"不確かなことに直面した時？",a:{zh:"相信自己能处理","zh-TW":"相信自己能處理",en:"Trust yourself to handle it",ja:"自分で対処できると信じる"},b:{zh:"反复思考各种坏情况","zh-TW":"反覆思考各種壞情況",en:"Overthink worst-case scenarios",ja:"最悪のケースを繰り返し考える"}},
{id:94,dim:"AT",zh:"社交媒体上发帖？","zh-TW":"社交媒體上發帖？",en:"Posting on social media?",ja:"SNSに投稿する時？",a:{zh:"发完就不管了","zh-TW":"發完就不管了",en:"Post and forget",ja:"投稿したら気にしない"},b:{zh:"反复检查别人反应","zh-TW":"反覆檢查別人反應",en:"Keep checking others' reactions",ja:"他人の反応を繰り返しチェック"}},
{id:95,dim:"AT",zh:"你的自我评价通常？","zh-TW":"你的自我評價通常？",en:"Your self-assessment is usually?",ja:"自己評価は通常？",a:{zh:"比较正面自信","zh-TW":"比較正面自信",en:"Fairly positive and confident",ja:"かなりポジティブで自信がある"},b:{zh:"倾向看到不足","zh-TW":"傾向看到不足",en:"Tend to see shortcomings",ja:"不足に目が行きがち"}},
{id:96,dim:"AT",zh:"做了一个重要决定后？","zh-TW":"做了一個重要決定後？",en:"After making an important decision?",ja:"重要な決断をした後？",a:{zh:"坚信自己的选择","zh-TW":"堅信自己的選擇",en:"Stand firm in your choice",ja:"自分の選択を確信する"},b:{zh:"会反复纠结对不对","zh-TW":"會反覆糾結對不對",en:"Keep second-guessing yourself",ja:"正しかったかずっと悩む"}},
{id:97,dim:"AT",zh:"失败后你通常？","zh-TW":"失敗後你通常？",en:"After failure, you usually?",ja:"失敗した後は通常？",a:{zh:"很快振作","zh-TW":"很快振作",en:"Bounce back quickly",ja:"すぐに立ち直る"},b:{zh:"需要较长时间恢复","zh-TW":"需要較長時間恢復",en:"Need a long time to recover",ja:"回復に長い時間が必要"}},
{id:98,dim:"AT",zh:"你对自己的外表？","zh-TW":"你對自己的外表？",en:"About your appearance?",ja:"自分の外見について？",a:{zh:"大体满意","zh-TW":"大體滿意",en:"Generally satisfied",ja:"おおむね満足"},b:{zh:"总觉得不够好","zh-TW":"總覺得不夠好",en:"Always feel it could be better",ja:"いつも十分でないと感じる"}},
{id:99,dim:"AT",zh:"当事情进展不顺？","zh-TW":"當事情進展不順？",en:"When things aren't going well?",ja:"物事がうまくいかない時？",a:{zh:"保持乐观","zh-TW":"保持樂觀",en:"Stay optimistic",ja:"楽観的でいる"},b:{zh:"容易感到沮丧","zh-TW":"容易感到沮喪",en:"Easily feel discouraged",ja:"すぐ落胆する"}},
{id:100,dim:"AT",zh:"你对生活的整体感受？","zh-TW":"你對生活的整體感受？",en:"Your overall feeling about life?",ja:"人生の全体的な感覚は？",a:{zh:"大多数时候很满足","zh-TW":"大多數時候很滿足",en:"Mostly content",ja:"ほとんどの場合満足している"},b:{zh:"经常觉得不够理想","zh-TW":"經常覺得不夠理想",en:"Often feel it's not ideal enough",ja:"よく理想的でないと感じる"}},
{id:101,dim:"AT",zh:"睡前你会？","zh-TW":"睡前你會？",en:"Before sleep, you?",ja:"寝る前に？",a:{zh:"很快入睡","zh-TW":"很快入睡",en:"Fall asleep quickly",ja:"すぐ寝つける"},b:{zh:"回想今天哪些没做好","zh-TW":"回想今天哪些沒做好",en:"Replay what didn't go well today",ja:"今日うまくいかなかったことを思い返す"}},
{id:102,dim:"AT",zh:"面对公开演讲？","zh-TW":"面對公開演講？",en:"Facing public speaking?",ja:"人前で話す時？",a:{zh:"虽紧张但有信心","zh-TW":"雖緊張但有信心",en:"Nervous but confident",ja:"緊張するが自信はある"},b:{zh:"非常焦虑想逃避","zh-TW":"非常焦慮想逃避",en:"Very anxious, want to escape",ja:"とても不安で逃げたい"}},
{id:103,dim:"AT",zh:"有人不同意你？","zh-TW":"有人不同意你？",en:"When someone disagrees with you?",ja:"誰かに反対された時？",a:{zh:"没关系各有看法","zh-TW":"沒關係各有看法",en:"That's fine, everyone has opinions",ja:"問題ない、それぞれの意見"},b:{zh:"会在意是不是自己错了","zh-TW":"會在意是不是自己錯了",en:"Wonder if you were wrong",ja:"自分が間違っていたか気になる"}},
{id:104,dim:"AT",zh:"你的情绪波动？","zh-TW":"你的情緒波動？",en:"Your emotional fluctuations?",ja:"感情の波は？",a:{zh:"比较平稳","zh-TW":"比較平穩",en:"Relatively stable",ja:"比較的安定している"},b:{zh:"起伏较大","zh-TW":"起伏較大",en:"Quite variable",ja:"かなり変動がある"}},
{id:105,dim:"AT",zh:"总体来说你觉得自己？","zh-TW":"總體來說你覺得自己？",en:"Overall, you see yourself as?",ja:"全体的に、自分は？",a:{zh:"自信且稳定","zh-TW":"自信且穩定",en:"Confident and stable",ja:"自信があり安定している"},b:{zh:"敏感且追求完美","zh-TW":"敏感且追求完美",en:"Sensitive and perfectionistic",ja:"繊細で完璧主義"}}

const GI={analysts:{n:{zh:"分析师","zh-TW":"分析師",en:"Analyst",ja:"分析家"},c:T.analysts,t:["INTJ","INTP","ENTJ","ENTP"]},diplomats:{n:{zh:"外交家","zh-TW":"外交家",en:"Diplomat",ja:"外交官"},c:T.diplomats,t:["INFJ","INFP","ENFJ","ENFP"]},sentinels:{n:{zh:"守护者","zh-TW":"守護者",en:"Sentinel",ja:"番人"},c:T.sentinels,t:["ISTJ","ISFJ","ESTJ","ESFJ"]},explorers:{n:{zh:"探索家","zh-TW":"探索家",en:"Explorer",ja:"探検家"},c:T.explorers,t:["ISTP","ISFP","ESTP","ESFP"]}};
function gG(b){for(const[k,v]of Object.entries(GI))if(v.t.includes(b))return v;return GI.analysts}
function calc(ans){const c={EI:[0,0],SN:[0,0],TF:[0,0],JP:[0,0],AT:[0,0]};ans.forEach(a=>{c[a.dim][a.choice==="a"?0:1]++});const p=d=>{const t=c[d][0]+c[d][1];return t===0?50:Math.round(c[d][1]/t*100)};const dims={EI:p("EI"),SN:p("SN"),TF:p("TF"),JP:p("JP"),AT:p("AT")};const e=dims.EI<50?"E":"I",s=dims.SN<50?"S":"N",t=dims.TF<50?"T":"F",j=dims.JP<50?"J":"P",a=dims.AT<50?"A":"T";return{type:`${e}${s}${t}${j}-${a}`,base:`${e}${s}${t}${j}`,variant:a,dims}}

const DC={EI:T.primary,SN:T.success,TF:T.error,JP:T.warning,AT:T.accent};
const POP={"INFJ":"1-2%","INTJ":"2-3%","INFP":"4-5%","INTP":"3-5%","ENFJ":"2-3%","ENTJ":"2-3%","ENFP":"6-8%","ENTP":"3-4%","ISTJ":"11-14%","ISFJ":"9-14%","ESTJ":"8-12%","ESFJ":"9-13%","ISTP":"4-6%","ISFP":"5-9%","ESTP":"4-6%","ESFP":"6-9%"};
